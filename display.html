<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاشة الزبون — مكتبة حشايشي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ═════ الثوابت والخلفيات ═════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a1a;--white:#f8fafc;--gray:#94a3b8;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--white);direction:rtl;}

.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;transition:opacity .6s ease;background:var(--bg);}
.screen.hidden{opacity:0;pointer-events:none;}

/* ═════ شاشة الكاشير ═════ */
.header{height:80px;background:rgba(15,15,40,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;}
.shop-name{font-size:20px;font-weight:900;}
.shop-name span{font-size:11px;color:var(--gray);display:block;}
.clock{font-size:28px;font-weight:900;letter-spacing:2px;font-variant-numeric:tabular-nums;}

.cashier-body{flex:1;display:grid;grid-template-columns:1fr 420px;}
.items-list{padding:30px;display:flex;flex-direction:column;gap:12px;overflow:hidden;}
.item-row{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:16px;animation:slideIn .4s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.item-qty{background:rgba(124,58,237,.2);color:#a855f7;padding:2px 10px;border-radius:10px;font-weight:700;font-size:12px;}

.total-panel{background:rgba(124,58,237,.06);border-right:1px solid var(--border);padding:30px;display:flex;flex-direction:column;gap:20px;}
.total-val{font-size:48px;font-weight:900;line-height:1;color:#fff;}
.cross-sell{margin-top:auto;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);padding:14px;border-radius:12px;color:#fcd34d;font-size:14px;font-weight:700;text-align:center;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}

/* ═════ شاشة الشكر + QR ═════ */
.thankyou{position:fixed;inset:0;background:rgba(10,10,26,.95);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.5s;}
.thankyou.show{opacity:1;}
.qr-box{background:#fff;padding:10px;border-radius:16px;margin-top:20px;box-shadow:0 0 40px rgba(16,185,129,.4);animation:pop .5s forwards;}
.qr-box img{width:150px;height:150px;}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}

/* ═════ شاشة الإعلانات (المؤثرات التلفزيونية) ═════ */
.ads-body{flex:1;position:relative;overflow:hidden;}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.slide.active{opacity:1;}

/* Ken Burns Effect للصورة الخلفية */
.kenburns-bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;opacity:0.6;transform:scale(1.05);}
.slide.active .kenburns-bg{animation:kenburns 15s linear forwards;}
@keyframes kenburns{from{transform:scale(1.05) translate(0,0)}to{transform:scale(1.15) translate(-1%,-1%)}}

/* طبقة لونية فوق الصورة */
.slide-overlay{position:absolute;inset:0;z-index:1;}

.slide-content{position:relative;z-index:2;padding:40px;width:100%;max-width:1000px;}
.slide-content h1{line-height:1.2;margin-bottom:20px;opacity:0;transform:translateY(20px);}
.slide-content p{font-size:24px;color:#cbd5e1;opacity:0;transform:translateY(20px);}
.slide.active .slide-content h1{animation:textUp .8s ease forwards .3s;}
.slide.active .slide-content p{animation:textUp .8s ease forwards .5s;}
@keyframes textUp{to{opacity:1;transform:translateY(0)}}

/* التأثيرات المتقدمة للخطوط */
.fx-glow{text-shadow:0 0 30px rgba(255,255,255,.6), 0 0 60px rgba(124,58,237,.8);}
.fx-shadow{text-shadow:4px 4px 10px rgba(0,0,0,.8);}
.fx-3d{text-shadow:1px 1px 0 #94a3b8, 2px 2px 0 #64748b, 3px 3px 0 #475569, 4px 4px 15px rgba(0,0,0,.6);}
.fx-none{text-shadow:none;}

/* ═════ شريط الأخبار ═════ */
.ticker{height:44px;background:rgba(124,58,237,.2);display:flex;align-items:center;overflow:hidden;}
.ticker-inner{display:flex;gap:50px;white-space:nowrap;font-size:16px;font-weight:700;animation:scroll 20s linear infinite;}
@keyframes scroll{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* ═════ شاشة Eco Mode ═════ */
#screen-eco{background:#000;display:flex;align-items:center;justify-content:center;z-index:999;}
.eco-logo{font-size:60px;opacity:.2;animation:float 10s linear infinite alternate;}
@keyframes float{0%{transform:translate(0,0)}100%{transform:translate(100px, -50px)}}
</style>
</head>
<body>

<!-- شاشة الكاشير -->
<div id="screen-cashier" class="screen">
  <div class="header">
    <div class="shop-name"><span id="shop-name-cashier">مكتبة حشايشي</span><span>الفاتورة الحالية</span></div>
    <div class="clock" id="clock-cashier">--:--</div>
  </div>
  <div class="cashier-body">
    <div class="items-list" id="items-list"></div>
    <div class="total-panel">
      <div style="color:var(--gray);font-weight:700">الإجمالي المستحق</div>
      <div class="total-val"><span id="total-val">0.00</span> <span style="font-size:20px;color:var(--gray)">د.ج</span></div>
      <div id="cross-sell" class="cross-sell" style="display:none"></div>
    </div>
  </div>
</div>

<!-- شاشة الشكر + QR -->
<div id="thankyou" class="thankyou">
  <div style="font-size:80px;animation:pop .6s cubic-bezier(.17,.88,.32,1.27)">✅</div>
  <div style="font-size:48px;font-weight:900;color:#fff;margin-top:10px">شكراً لزيارتكم!</div>
  <div style="font-size:24px;color:var(--gray)">تمت العملية بنجاح</div>
  <div id="qr-container" style="display:none">
    <div class="qr-box"><img id="qr-img" src="" alt="QR"></div>
    <div style="margin-top:10px;font-weight:700">امسح لتقييمنا 🌟</div>
  </div>
</div>

<!-- شاشة الإعلانات التلفزيونية -->
<div id="screen-ads" class="screen hidden">
  <div class="header">
    <div class="shop-name"><span id="shop-name-ads">مكتبة حشايشي</span><span id="date-hijri"></span></div>
    <div class="clock" id="clock-ads">--:--</div>
  </div>
  <div class="ads-body" id="ads-body"></div>
  <div class="ticker">
    <div class="ticker-inner" id="ticker-inner"></div>
  </div>
</div>

<!-- شاشة Eco Mode -->
<div id="screen-eco" class="screen hidden">
  <div class="eco-logo">📚 مكتبة حشايشي</div>
</div>

<script>
/* ═══════════════════════════════════════════
   1. مولد الأصوات (Audio Synthesizer) - بدون ملفات خارجية!
   ═══════════════════════════════════════════ */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  if(!config.sounds) return;
  if(audioCtx.state === 'suspended') audioCtx.resume();
  
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  
  const now = audioCtx.currentTime;
  
  if(type === 'beep') { // صوت إضافة منتج للسلة
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now); // نغمة A5
    gainNode.gain.setValueAtTime(0.1, now);
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.start(now);
    osc.stop(now + 0.1);
  } 
  else if(type === 'chime') { // صوت احتفالي عند الدفع
    // عزف تآلف موسيقي (Arpeggio)
    [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => { // C5, E5, G5, C6
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'triangle';
      o.frequency.value = freq;
      o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0, now + (i*0.1));
      g.gain.linearRampToValueAtTime(0.15, now + (i*0.1) + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, now + (i*0.1) + 1.5);
      o.start(now + (i*0.1));
      o.stop(now + (i*0.1) + 1.5);
    });
  }
}

/* ═══════════════════════════════════════════
   2. IndexedDB & Config (قراءة البيانات)
   ═══════════════════════════════════════════ */
let config = { shopName: 'مكتبة حشايشي', sounds: 1, ecoMode: 300, qrLink: '', crossSell: '', slides: [] };
let imagesDB = [];

const dbReq = indexedDB.open('HashayshiDisplayDB', 1);
dbReq.onsuccess = e => {
  const db = e.target.result;
  if(!db.objectStoreNames.contains('images')) return;
  const req = db.transaction('images','readonly').objectStore('images').getAll();
  req.onsuccess = () => { imagesDB = req.result; loadConfig(); };
};

function loadConfig() {
  const c = localStorage.getItem('hch_display_cfg');
  if(c) config = Object.assign(config, JSON.parse(c));
  
  document.getElementById('shop-name-cashier').innerText = config.shopName;
  document.getElementById('shop-name-ads').innerText = config.shopName;
  
  const cs = document.getElementById('cross-sell');
  if(config.crossSell) { cs.innerText = '💡 ' + config.crossSell; cs.style.display = 'block'; }
  else cs.style.display = 'none';

  if(config.ticker && config.ticker.length) {
    document.getElementById('ticker-inner').innerHTML = config.ticker.join(' &nbsp;&nbsp;✦&nbsp;&nbsp; ');
  }

  buildSlides();
}

/* ═══════════════════════════════════════════
   3. بناء الشرائح التلفزيونية (TV Engine)
   ═══════════════════════════════════════════ */
let slideTimer;
let currentSlide = 0;

const COLORS = {
  purple: 'radial-gradient(ellipse at center, rgba(124,58,237,0.4) 0%, rgba(10,10,26,1) 100%)',
  blue: 'radial-gradient(ellipse at center, rgba(59,130,246,0.4) 0%, rgba(10,10,26,1) 100%)',
  green: 'radial-gradient(ellipse at center, rgba(16,185,129,0.4) 0%, rgba(10,10,26,1) 100%)',
  dark: 'radial-gradient(ellipse at center, rgba(30,41,59,0.6) 0%, rgba(10,10,26,1) 100%)'
};

function buildSlides() {
  const body = document.getElementById('ads-body');
  body.innerHTML = '';
  
  // تصفية الشرائح المجدولة زمنياً
  const nowStr = new Date().toTimeString().slice(0,5);
  const activeSlides = config.slides.filter(s => !s.time || nowStr >= s.time);

  if(!activeSlides.length) return;

  activeSlides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i===0?' active':'');
    div.id = 'slide-'+i;
    
    // Ken Burns Image Background
    let bgHtml = '';
    if(s.bgId) {
      const img = imagesDB.find(x => x.id === s.bgId);
      if(img) bgHtml = `<div class="kenburns-bg" style="background-image:url(${img.data})"></div>`;
    }

    const overlay = `<div class="slide-overlay" style="background:${COLORS[s.color]||COLORS.purple}"></div>`;
    
    const content = `
      <div class="slide-content fx-${s.fx||'glow'}">
        <h1 style="font-size:${s.size||64}px; font-weight:900; color:#fff">${s.title||''}</h1>
        <p>${s.desc||''}</p>
      </div>`;

    div.innerHTML = bgHtml + overlay + content;
    body.appendChild(div);
  });

  currentSlide = 0;
  startSlideshow(activeSlides);
}

function startSlideshow(slides) {
  clearInterval(slideTimer);
  const total = slides.length;
  if(total <= 1) return;
  
  const dur = slides[0].dur * 1000;
  slideTimer = setInterval(() => {
    document.getElementById('slide-'+currentSlide).classList.remove('active');
    currentSlide = (currentSlide + 1) % total;
    document.getElementById('slide-'+currentSlide).classList.add('active');
    
    // تغيير التوقيت بناءً على إعداد الشريحة القادمة
    startSlideshow(slides); 
  }, slides[currentSlide].dur * 1000);
}

/* ═══════════════════════════════════════════
   4. إدارة وضع الشاشات (Cashier / Ads / Eco)
   ═══════════════════════════════════════════ */
let mode = 'ads';
let idleTimer;

function switchMode(newMode) {
  if(mode === newMode) return;
  mode = newMode;
  document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
  document.getElementById('screen-' + newMode).classList.remove('hidden');
}

function resetIdle() {
  clearTimeout(idleTimer);
  if(config.ecoMode > 0) {
    idleTimer = setTimeout(() => switchMode('eco'), config.ecoMode * 1000);
  }
}

/* ═══════════════════════════════════════════
   5. مراقب المبيعات (Live Sync)
   ═══════════════════════════════════════════ */
let lastCartHash = '';
let lastSaleId = null;

setInterval(() => {
  // 1. تحديث الإعدادات إذا تم تعديلها في لوحة التحكم
  const syncId = localStorage.getItem('hch_display_sync');
  if(syncId && syncId !== window._lastSync) { window._lastSync = syncId; loadConfig(); }

  // 2. قراءة بيانات السلة (Live Cart)
  const cartRaw = localStorage.getItem('hashayshi_display_cart');
  if(cartRaw) {
    try {
      const cart = JSON.parse(cartRaw);
      const hash = JSON.stringify(cart.items);
      
      if(cart.active) {
        if(hash !== lastCartHash && cart.items.length > 0) {
          // عنصر جديد تمت إضافته
          if(lastCartHash.length < hash.length) playSound('beep'); 
          lastCartHash = hash;
          renderCart(cart.items, cart.total);
        }
        switchMode('cashier');
        resetIdle();
      } else {
        if(mode === 'cashier' && !document.getElementById('thankyou').classList.contains('show')) {
          switchMode('ads');
        }
        lastCartHash = '';
      }
    } catch(e){}
  }

  // 3. قراءة اكتمال البيع
  const saleRaw = localStorage.getItem('hashayshi_display_complete');
  if(saleRaw) {
    try {
      const sale = JSON.parse(saleRaw);
      if(sale.id !== lastSaleId) {
        lastSaleId = sale.id;
        showThankYou();
      }
    } catch(e){}
  }

}, 300);

function renderCart(items, total) {
  const list = document.getElementById('items-list');
  list.innerHTML = items.slice(-6).map(item => `
    <div class="item-row">
      <div style="flex:1;font-size:18px;font-weight:700">${item.name||'منتج'}</div>
      <div class="item-qty">${item.qty} × ${item.price}</div>
      <div style="font-size:20px;font-weight:900;color:#a855f7">${item.qty * item.price}</div>
    </div>
  `).join('');
  document.getElementById('total-val').innerText = Number(total).toLocaleString('en-US',{minimumFractionDigits:2});
}

function showThankYou() {
  playSound('chime');
  
  // عرض QR Code إذا كان مفعلاً
  const qrBox = document.getElementById('qr-container');
  if(config.qrLink) {
    document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(config.qrLink)}`;
    qrBox.style.display = 'block';
  } else {
    qrBox.style.display = 'none';
  }

  const ty = document.getElementById('thankyou');
  ty.classList.add('show');
  
  setTimeout(() => { ty.classList.remove('show'); switchMode('ads'); resetIdle(); }, 6000);
}

/* ═══════════════════════════════════════════
   6. الساعة والتاريخ الهجري
   ═══════════════════════════════════════════ */
setInterval(() => {
  const d = new Date();
  const t = d.toLocaleTimeString('ar-DZ',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clock-cashier').innerText = t;
  document.getElementById('clock-ads').innerText = t;
  // تاريخ هجري تقريبي (بدون API)
  document.getElementById('date-hijri').innerText = new Intl.DateTimeFormat('ar-TN-u-ca-islamic', {day:'numeric',month:'long',year:'numeric'}).format(d);
}, 1000);

// بدء العمل
switchMode('ads');
resetIdle();
</script>
</body>
</html>
