<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم شاشة الزبون المتقدمة</title>
<style>
/* ═════ التنسيقات الأساسية ═════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--p:#7c3aed;--p2:#6d28d9;--g:#16a34a;--r:#dc2626;--bg:#f0f2f8;--card:#fff;--border:#e5e7eb;--text:#1e1b4b;--sub:#64748b;--muted:#9ca3af;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;}
.topbar{background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(124,58,237,.3);}
.topbar-brand{display:flex;align-items:center;gap:12px;}
.topbar-icon{width:44px;height:44px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.container{max-width:1200px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start;}
@media(max-width:768px){.container{grid-template-columns:1fr;}}
.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px;}
.card-title{font-size:14px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;}
.input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;background:#fff;transition:.2s;}
.input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.1);}
.fg{margin-bottom:14px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{padding:10px 18px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.2s;}
.btn:active{transform:scale(.96);}
.btn-p{background:var(--p);color:#fff;}.btn-p:hover{background:var(--p2);}
.btn-g{background:var(--g);color:#fff;}
.btn-r{background:var(--r);color:#fff;}
.btn-out{background:#fff;color:var(--p);border:1.5px solid var(--p);}
.btn-gray{background:#f4f6fb;color:var(--text);border:1px solid var(--border);}
.btn-full{width:100%;justify-content:center;}.btn-sm{padding:6px 12px;font-size:12px;}

/* ═════ قائمة الشرائح ═════ */
.slides-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.slide-item{background:#f8fafc;border:1.5px solid var(--border);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;}
.slide-thumb{width:60px;height:40px;border-radius:6px;background:#e2e8f0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.slide-thumb img{width:100%;height:100%;object-fit:cover;}
.slide-info{flex:1;min-width:0;}
.slide-actions{display:flex;gap:6px;}
.ic-btn{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ═════ المكتبة والتخزين ═════ */
.upload-zone{border:2px dashed #c4b5fd;border-radius:14px;padding:20px;text-align:center;cursor:pointer;background:#faf5ff;margin-bottom:12px;}
.img-preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.img-thumb-wrap{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:16/9;}
.img-thumb-wrap img{width:100%;height:100%;object-fit:cover;}
.img-thumb-del{position:absolute;top:4px;left:4px;background:rgba(220,38,38,.9);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;}

/* ═════ المودال ═════ */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(15,10,40,.6);z-index:999;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal-ov.show{display:flex;}
.modal{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-opt{width:30px;height:30px;border-radius:8px;cursor:pointer;border:3px solid transparent;}
.color-opt.sel{border-color:#1e1b4b;transform:scale(1.1);}

/* ═════ الإشعارات ═════ */
.toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%, 80px);background:#1e1b4b;color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;transition:.4s;opacity:0;z-index:9999;}
.toast.show{transform:translate(-50%, 0);opacity:1;}
.toast.ok{background:#16a34a;}.toast.err{background:#dc2626;}

.range-wrap{display:flex;align-items:center;gap:10px;}
.range-wrap input{flex:1;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-icon">📺</div>
    <div>
      <div style="font-weight:900;font-size:18px">لوحة تحكم الشاشة الذكية</div>
      <div style="font-size:11px;opacity:.8">مكتبة حشايشي — إصدار V3 (IndexedDB)</div>
    </div>
  </div>
</div>

<div class="container">
  <!-- العمود الأيسر (الإعدادات والشرائح) -->
  <div>
    <!-- قسم الشرائح -->
    <div class="card">
      <div class="card-title">🎞️ إدارة الشرائح الذكية
        <button class="btn btn-p btn-sm" onclick="openSlideModal()" style="margin-right:auto">➕ شريحة جديدة</button>
      </div>
      <div class="slides-list" id="slides-list"></div>
      <button class="btn btn-g btn-full" onclick="pushToDisplay()">📡 حفظ وإرسال للشاشة</button>
    </div>

    <!-- قسم مكتبة الصور (IndexedDB) -->
    <div class="card">
      <div class="card-title">🖼️ مكتبة الصور (غير محدودة)
        <span style="font-size:10px;color:var(--g);margin-right:auto">✓ IndexedDB</span>
      </div>
      <div class="upload-zone" onclick="document.getElementById('img-input').click()">
        <div style="font-size:24px;margin-bottom:8px">📸</div>
        <div style="font-size:13px;font-weight:700;color:var(--p)">انقر لرفع صور عالية الدقة</div>
      </div>
      <input type="file" id="img-input" accept="image/*" multiple style="display:none" onchange="uploadImages(event)">
      <div class="img-preview-grid" id="img-grid"></div>
    </div>
    
    <!-- قسم شريط الأخبار -->
    <div class="card">
      <div class="card-title">📢 شريط الأخبار المتحرك</div>
      <div id="ticker-list" style="margin-bottom:10px;font-size:12px;"></div>
      <div style="display:flex;gap:8px">
        <input id="new-ticker" class="input" placeholder="خبر جديد...">
        <button class="btn btn-p" onclick="addTicker()">➕</button>
      </div>
    </div>
  </div>

  <!-- العمود الأيمن (الإعدادات العامة) -->
  <div>
    <div class="card">
      <div class="card-title">⚙️ الإعدادات العامة للشاشة</div>
      
      <div class="fg">
        <label class="label">اسم المتجر</label>
        <input id="cfg-name" class="input" value="مكتبة حشايشي">
      </div>
      
      <div class="frow">
        <div class="fg">
          <label class="label">تفعيل الأصوات (الكاشير)</label>
          <select id="cfg-sounds" class="input">
            <option value="1">🔊 مفعل (صوت الدفع)</option>
            <option value="0">🔇 معطل</option>
          </select>
        </div>
        <div class="fg">
          <label class="label">وضع توفير الطاقة (Eco)</label>
          <select id="cfg-eco" class="input">
            <option value="300">بعد 5 دقائق خمول</option>
            <option value="600">بعد 10 دقائق</option>
            <option value="0">إيقاف</option>
          </select>
        </div>
      </div>

      <div class="fg">
        <label class="label">رابط الفاتورة الذكية / التقييم (QR Code)</label>
        <input id="cfg-qr" class="input" placeholder="https://g.page/r/...">
      </div>

      <div class="fg">
        <label class="label">اقتراح ذكي أسفل السلة (Cross-selling)</label>
        <input id="cfg-cross" class="input" placeholder="مثال: هل نسيت ورق A4؟ متوفر بخصم!">
      </div>

      <button class="btn btn-g btn-full" onclick="pushToDisplay()">💾 تطبيق الإعدادات</button>
    </div>
  </div>
</div>

<!-- مودال إضافة/تعديل شريحة -->
<div id="m-slide" class="modal-ov">
  <div class="modal">
    <div class="card-title">✏️ إعدادات الشريحة الذكية</div>
    <input type="hidden" id="sl-id">
    
    <div class="frow">
      <div class="fg">
        <label class="label">نوع الشريحة</label>
        <select id="sl-type" class="input">
          <option value="welcome">🏠 ترحيب</option>
          <option value="promo">🎉 عرض / مخصص</option>
          <option value="stats">📊 إحصائيات المتجر</option>
        </select>
      </div>
      <div class="fg">
        <label class="label">لون الخلفية الأساسي</label>
        <div class="color-row" id="color-row">
          <div class="color-opt sel" data-c="purple" style="background:#7c3aed" onclick="selColor(this)"></div>
          <div class="color-opt" data-c="blue" style="background:#3b82f6" onclick="selColor(this)"></div>
          <div class="color-opt" data-c="green" style="background:#10b981" onclick="selColor(this)"></div>
          <div class="color-opt" data-c="dark" style="background:#1e293b" onclick="selColor(this)"></div>
        </div>
      </div>
    </div>

    <div class="fg">
      <label class="label">العنوان الرئيسي</label>
      <input id="sl-title" class="input" placeholder="أدخل العنوان...">
    </div>
    
    <div class="fg">
      <label class="label">النص الفرعي / الوصف</label>
      <input id="sl-desc" class="input" placeholder="أدخل الوصف...">
    </div>

    <!-- ميزات متقدمة للخطوط والخلفيات -->
    <div class="card" style="background:#f8fafc;padding:12px;margin-bottom:14px;box-shadow:none;border:1px solid var(--border)">
      <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--p)">✨ تأثيرات سينمائية</div>
      
      <div class="frow">
        <div class="fg">
          <label class="label">حجم الخط (Title)</label>
          <div class="range-wrap">
            <input type="range" id="sl-size" min="30" max="100" value="64" oninput="document.getElementById('sz-val').innerText=this.value+'px'">
            <span id="sz-val" style="font-size:11px;font-weight:bold">64px</span>
          </div>
        </div>
        <div class="fg">
          <label class="label">تأثير النص (Effect)</label>
          <select id="sl-fx" class="input">
            <option value="glow">إشعاع نيون (Glow)</option>
            <option value="shadow">ظل عميق (Drop Shadow)</option>
            <option value="3d">تأثير 3D</option>
            <option value="none">بدون تأثير</option>
          </select>
        </div>
      </div>

      <div class="fg">
        <label class="label">صورة الخلفية (Ken Burns Effect)</label>
        <select id="sl-bg" class="input"><option value="">بدون صورة خلفية (لون فقط)</option></select>
      </div>
    </div>

    <div class="frow">
      <div class="fg">
        <label class="label">مدة العرض (ثواني)</label>
        <input type="number" id="sl-dur" class="input" value="6">
      </div>
      <div class="fg">
        <label class="label">مجدولة (لا تعرض قبل)</label>
        <input type="time" id="sl-time" class="input" title="اتركه فارغاً للعرض الدائم">
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-p" style="flex:1" onclick="saveSlide()">💾 حفظ</button>
      <button class="btn btn-gray" onclick="document.getElementById('m-slide').classList.remove('show')">إلغاء</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   1. IndexedDB Wrapper (لتخزين الصور بلا حدود)
   ═══════════════════════════════════════════ */
const DB_NAME = 'HashayshiDisplayDB';
const STORE_NAME = 'images';
let db;

function initDB(callback) {
  const req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id' });
  req.onsuccess = e => { db = e.target.result; callback(); };
}

function saveImageToDB(imgObj, cb) {
  const tx = db.transaction(STORE_NAME, 'readwrite');
  tx.objectStore(STORE_NAME).put(imgObj);
  tx.oncomplete = cb;
}

function getImagesFromDB(cb) {
  const tx = db.transaction(STORE_NAME, 'readonly');
  const req = tx.objectStore(STORE_NAME).getAll();
  req.onsuccess = () => cb(req.result);
}

function deleteImageFromDB(id, cb) {
  const tx = db.transaction(STORE_NAME, 'readwrite');
  tx.objectStore(STORE_NAME).delete(id);
  tx.oncomplete = cb;
}

/* ═══════════════════════════════════════════
   2. إدارة الإعدادات والشرائح (Config)
   ═══════════════════════════════════════════ */
let config = {
  shopName: 'مكتبة حشايشي', sounds: 1, ecoMode: 300, qrLink: '', crossSell: '',
  ticker: ['أهلاً وسهلاً بكم في مكتبة حشايشي', 'تشكيلة واسعة من الأدوات المدرسية'],
  slides: [
    {id:'s1', type:'welcome', title:'أهلاً بكم', desc:'مكتبتكم المفضلة', color:'purple', dur:6, size:64, fx:'glow'}
  ]
};
let selectedColor = 'purple';

function loadConfig() {
  const c = localStorage.getItem('hch_display_cfg');
  if(c) config = Object.assign(config, JSON.parse(c));
  
  document.getElementById('cfg-name').value = config.shopName;
  document.getElementById('cfg-sounds').value = config.sounds;
  document.getElementById('cfg-eco').value = config.ecoMode;
  document.getElementById('cfg-qr').value = config.qrLink;
  document.getElementById('cfg-cross').value = config.crossSell;
  
  renderSlides();
  renderTicker();
}

function renderTicker() {
  document.getElementById('ticker-list').innerHTML = config.ticker.map((t, i) => 
    `<div style="display:flex;justify-content:space-between;background:#f1f5f9;padding:6px 10px;margin-bottom:4px;border-radius:6px;">
      <span>${t}</span><span style="color:red;cursor:pointer" onclick="delTicker(${i})">✕</span>
    </div>`
  ).join('');
}
function addTicker(){ 
  const v = document.getElementById('new-ticker').value; 
  if(v){ config.ticker.push(v); document.getElementById('new-ticker').value=''; renderTicker(); }
}
function delTicker(i){ config.ticker.splice(i,1); renderTicker(); }

function renderSlides() {
  getImagesFromDB(images => {
    document.getElementById('slides-list').innerHTML = config.slides.map((s, i) => {
      let bgImg = images.find(img => img.id === s.bgId);
      return `
      <div class="slide-item">
        <div class="slide-thumb" style="background:${s.color === 'purple' ? '#7c3aed' : s.color==='blue'?'#3b82f6':s.color==='green'?'#10b981':'#1e293b'}">
          ${bgImg ? `<img src="${bgImg.data}">` : `<span style="color:#fff">🎨</span>`}
        </div>
        <div class="slide-info">
          <div style="font-weight:bold;font-size:13px">${s.title || 'بدون عنوان'}</div>
          <div style="font-size:10px;color:var(--sub)">⏱ ${s.dur}ث | ${s.type} | خط: ${s.size}px</div>
        </div>
        <div class="slide-actions">
          <button class="ic-btn" style="background:#e0f2fe;color:#0284c7" onclick="editSlide(${i})">✏️</button>
          <button class="ic-btn" style="background:#fee2e2;color:#dc2626" onclick="delSlide(${i})">🗑️</button>
        </div>
      </div>`;
    }).join('');
    
    // تحديث قائمة الصور في المودال
    let bgSel = document.getElementById('sl-bg');
    bgSel.innerHTML = '<option value="">بدون صورة خلفية (لون فقط)</option>' + 
      images.map(img => `<option value="${img.id}">${img.name}</option>`).join('');
  });
}

function openSlideModal(idx = -1) {
  const isNew = idx === -1;
  const s = isNew ? {id:'s'+Date.now(), type:'promo', title:'', desc:'', color:'purple', dur:6, size:64, fx:'glow', bgId:'', time:''} : config.slides[idx];
  
  document.getElementById('sl-id').value = isNew ? -1 : idx;
  document.getElementById('sl-type').value = s.type;
  document.getElementById('sl-title').value = s.title;
  document.getElementById('sl-desc').value = s.desc;
  document.getElementById('sl-dur').value = s.dur;
  document.getElementById('sl-size').value = s.size || 64;
  document.getElementById('sz-val').innerText = (s.size || 64) + 'px';
  document.getElementById('sl-fx').value = s.fx || 'glow';
  document.getElementById('sl-time').value = s.time || '';
  
  setTimeout(()=> document.getElementById('sl-bg').value = s.bgId || '', 100);
  
  document.querySelectorAll('.color-opt').forEach(el => el.classList.remove('sel'));
  document.querySelector(`.color-opt[data-c="${s.color}"]`).classList.add('sel');
  selectedColor = s.color;
  
  document.getElementById('m-slide').classList.add('show');
}

function selColor(el) {
  document.querySelectorAll('.color-opt').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
  selectedColor = el.dataset.c;
}

function saveSlide() {
  const idx = parseInt(document.getElementById('sl-id').value);
  const slide = {
    id: idx === -1 ? 's'+Date.now() : config.slides[idx].id,
    type: document.getElementById('sl-type').value,
    title: document.getElementById('sl-title').value,
    desc: document.getElementById('sl-desc').value,
    color: selectedColor,
    dur: parseInt(document.getElementById('sl-dur').value) || 6,
    size: parseInt(document.getElementById('sl-size').value),
    fx: document.getElementById('sl-fx').value,
    bgId: document.getElementById('sl-bg').value,
    time: document.getElementById('sl-time').value
  };
  
  if(idx === -1) config.slides.push(slide);
  else config.slides[idx] = slide;
  
  document.getElementById('m-slide').classList.remove('show');
  renderSlides();
}

function delSlide(i) { if(confirm('حذف؟')) { config.slides.splice(i,1); renderSlides(); } }

/* ═══════════════════════════════════════════
   3. إدارة الصور (Compress & IDB)
   ═══════════════════════════════════════════ */
function uploadImages(e) {
  const files = Array.from(e.target.files);
  if(!files.length) return;
  e.target.value = '';
  
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if(w > 1280) { h = Math.round(h * 1280 / w); w = 1280; } // حجم ممتاز للشاشات
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        
        const imgObj = {
          id: 'img_'+Date.now()+Math.random(),
          name: file.name,
          data: canvas.toDataURL('image/jpeg', 0.8)
        };
        saveImageToDB(imgObj, renderImages);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderImages() {
  getImagesFromDB(images => {
    document.getElementById('img-grid').innerHTML = images.map(img => 
      `<div class="img-thumb-wrap">
        <img src="${img.data}">
        <button class="img-thumb-del" onclick="delImage('${img.id}')">✕</button>
      </div>`
    ).join('');
    renderSlides(); // لتحديث الخيارات
  });
}

function delImage(id) {
  if(confirm('حذف الصورة؟ ستختفي من الشرائح المرتبطة بها.')) {
    deleteImageFromDB(id, renderImages);
  }
}

/* ═══════════════════════════════════════════
   4. الإرسال للشاشة (Push)
   ═══════════════════════════════════════════ */
function pushToDisplay() {
  config.shopName = document.getElementById('cfg-name').value;
  config.sounds = parseInt(document.getElementById('cfg-sounds').value);
  config.ecoMode = parseInt(document.getElementById('cfg-eco').value);
  config.qrLink = document.getElementById('cfg-qr').value;
  config.crossSell = document.getElementById('cfg-cross').value;
  
  localStorage.setItem('hch_display_cfg', JSON.stringify(config));
  
  // إشارة التحديث للشاشة
  localStorage.setItem('hch_display_sync', Date.now().toString());
  
  toast('تم حفظ الإعدادات وإرسالها للشاشة بنجاح ✅');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.className = 'toast show ok';
  setTimeout(()=> t.className='toast', 3000);
}

window.onload = () => initDB(() => { loadConfig(); renderImages(); });
</script>
</body>
</html>
